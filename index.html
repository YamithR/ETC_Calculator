<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETC Calculator</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f5f0e8;
    color: #2c2c2c;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    line-height: 1.5;
  }
  .container {
    width: 100%;
    max-width: 720px;
  }
  header {
    background: #1a3a5c;
    color: #fff;
    padding: 1.5rem 2rem;
    border-radius: 8px;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  header p {
    font-size: 0.875rem;
    opacity: 0.8;
    margin-top: 0.25rem;
  }
  .card {
    background: #fff;
    border-radius: 8px;
    padding: 1.5rem 2rem;
    margin-bottom: 1rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .card-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #1a3a5c;
    margin-bottom: 1.25rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid #1a3a5c;
  }
  .form-row {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    margin-bottom: 1rem;
  }
  .form-row label {
    font-size: 0.875rem;
    font-weight: 500;
    color: #444;
  }
  .form-row input {
    padding: 0.625rem 0.75rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-row input:focus {
    border-color: #1a3a5c;
    box-shadow: 0 0 0 2px rgba(26,58,92,0.15);
  }
  .hint {
    font-size: 0.75rem;
    color: #888;
  }
  .btn {
    display: inline-block;
    width: 100%;
    padding: 0.75rem;
    background: #1a3a5c;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 0.5rem;
  }
  .btn:hover {
    background: #234e78;
  }
  .btn:active {
    background: #142c47;
  }
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem 1.5rem;
  }
  .result-item {
    display: flex;
    justify-content: space-between;
    padding: 0.35rem 0;
    font-size: 0.875rem;
    border-bottom: 1px solid #f0ede8;
  }
  .result-item .label {
    color: #666;
  }
  .result-item .value {
    font-weight: 600;
    color: #1a3a5c;
  }
  .result-item.full {
    grid-column: 1 / -1;
  }
  .result-item.highlight {
    background: #f0f4f8;
    padding: 0.5rem 0.75rem;
    border-radius: 4px;
    border-bottom: none;
  }
  .result-item.highlight .value {
    color: #1a3a5c;
    font-size: 1rem;
  }
  .warning {
    background: #fff3e0;
    border-left: 4px solid #f57c00;
    padding: 0.75rem 1rem;
    border-radius: 4px;
    font-size: 0.875rem;
    color: #8d5a00;
    margin-bottom: 0.75rem;
  }
  .error-msg {
    background: #fdecea;
    border-left: 4px solid #d32f2f;
    padding: 0.75rem 1rem;
    border-radius: 4px;
    font-size: 0.875rem;
    color: #a00;
    margin-bottom: 0.75rem;
    display: none;
  }
  .results-section {
    display: none;
  }
  footer {
    text-align: center;
    font-size: 0.75rem;
    color: #999;
    margin-top: 0.5rem;
    padding: 1rem 0;
  }
  @media (max-width: 600px) {
    body { padding: 1rem 0.75rem; }
    .card { padding: 1rem 1.25rem; }
    header { padding: 1rem 1.25rem; }
    header h1 { font-size: 1.25rem; }
    .result-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>ETC Calculator</h1>
    <p>Estimated Cargo Completion Time</p>
  </header>

  <div class="card">
    <div class="card-title">Input Parameters</div>
    <div class="form-row">
      <label for="totalCargo">Total Cargo (MT)</label>
      <input type="text" id="totalCargo" placeholder="e.g. 50000 or 45000+5000">
      <span class="hint">Supports math expressions: + - * / ( )</span>
    </div>
    <div class="form-row">
      <label for="loadedCargo">Loaded Cargo (MT)</label>
      <input type="text" id="loadedCargo" placeholder="e.g. 20000">
    </div>
    <div class="form-row">
      <label for="trimmingCargo">Trimming Cargo (MT)</label>
      <input type="text" id="trimmingCargo" placeholder="e.g. 5000">
    </div>
    <div class="form-row">
      <label for="loadingRate">Loading Rate (MT/h)</label>
      <input type="text" id="loadingRate" placeholder="e.g. 1500">
    </div>
    <div class="form-row">
      <label for="stepsRemaining">Steps Remaining</label>
      <input type="text" id="stepsRemaining" placeholder="e.g. 3">
    </div>
    <button class="btn" id="calculateBtn">Calculate ETC</button>
  </div>

  <div id="errorContainer" class="error-msg"></div>
  <div id="warningContainer" class="warning" style="display:none;"></div>

  <div id="resultsSection" class="results-section">
    <div class="card">
      <div class="card-title">Input Summary</div>
      <div class="result-grid" id="inputSummary"></div>
    </div>

    <div class="card">
      <div class="card-title">Final ETC Calculation</div>
      <div class="result-grid" id="etcCalculation"></div>
    </div>

    <div class="card">
      <div class="card-title">Intermediate Calculation</div>
      <div class="result-grid" id="intermediateCalc"></div>
    </div>

    <div class="card">
      <div class="card-title">Estimated Times</div>
      <div class="result-grid" id="estimatedTimes"></div>
    </div>
  </div>

  <footer>ETC Calculator v1.0.0</footer>
</div>

<script>
  function evaluateExpression(input) {
    const cleaned = input.replace(/,/g, '.').replace(/\s/g, '');
    if (!cleaned) return null;
    if (!/^[\d+\-*/().]+$/.test(cleaned)) return null;
    try {
      const result = Function('"use strict"; return (' + cleaned + ')')();
      if (typeof result !== 'number' || !isFinite(result)) return null;
      return result;
    } catch {
      return null;
    }
  }

  function fmt(num) {
    return num.toFixed(2);
  }

  function pad(n) {
    return String(n).padStart(2, '0');
  }

  function formatDate(ts) {
    const d = new Date(ts);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ' / ' + pad(d.getDate()) + '-' + months[d.getMonth()] + '-' + d.getFullYear();
  }

  function createResultItem(label, value, extraClass) {
    const div = document.createElement('div');
    div.className = 'result-item' + (extraClass ? ' ' + extraClass : '');
    div.innerHTML = '<span class="label">' + label + '</span><span class="value">' + value + '</span>';
    return div;
  }

  document.getElementById('calculateBtn').addEventListener('click', function() {
    const errorContainer = document.getElementById('errorContainer');
    const warningContainer = document.getElementById('warningContainer');
    const resultsSection = document.getElementById('resultsSection');

    errorContainer.style.display = 'none';
    warningContainer.style.display = 'none';
    resultsSection.style.display = 'none';

    const totalCargo = evaluateExpression(document.getElementById('totalCargo').value);
    const loadedCargo = evaluateExpression(document.getElementById('loadedCargo').value);
    const trimmingCargo = evaluateExpression(document.getElementById('trimmingCargo').value);
    const loadingRate = evaluateExpression(document.getElementById('loadingRate').value);
    const stepsRemainingRaw = evaluateExpression(document.getElementById('stepsRemaining').value);

    if (totalCargo === null || loadedCargo === null || trimmingCargo === null || loadingRate === null || stepsRemainingRaw === null) {
      errorContainer.textContent = 'Error: Invalid input. Only numbers and math operations (+, -, *, /, parentheses) are allowed.';
      errorContainer.style.display = 'block';
      return;
    }

    if (loadingRate <= 0) {
      errorContainer.textContent = 'Error: Loading Rate must be greater than zero.';
      errorContainer.style.display = 'block';
      return;
    }

    if (loadedCargo > totalCargo) {
      errorContainer.textContent = 'Error: Loaded Cargo cannot be greater than Total Cargo.';
      errorContainer.style.display = 'block';
      return;
    }

    if (trimmingCargo < 0) {
      errorContainer.textContent = 'Error: Trimming Cargo cannot be negative.';
      errorContainer.style.display = 'block';
      return;
    }

    if (trimmingCargo > totalCargo) {
      errorContainer.textContent = 'Error: Trimming Cargo cannot be greater than Total Cargo.';
      errorContainer.style.display = 'block';
      return;
    }

    const stepsRemaining = Math.round(stepsRemainingRaw);
    if (stepsRemaining < 1 || Math.abs(stepsRemainingRaw - stepsRemaining) > 0.0001) {
      errorContainer.textContent = 'Error: Steps Remaining must be an integer greater than or equal to 1.';
      errorContainer.style.display = 'block';
      return;
    }

    const cargoBeforeIntermediate = totalCargo - trimmingCargo;

    if (cargoBeforeIntermediate < loadedCargo) {
      warningContainer.innerHTML = '<strong>Warning:</strong> The Intermediate point has already been passed.<br>Cargo before Intermediate: ' + fmt(cargoBeforeIntermediate) + ' MT<br>Current Loaded Cargo: ' + fmt(loadedCargo) + ' MT';
      warningContainer.style.display = 'block';
      return;
    }

    const loadingTime = (totalCargo - loadedCargo) / loadingRate;
    const deadTime = ((stepsRemaining * 10) / 60) + 1;
    const totalCompletionTime = loadingTime + deadTime;

    const loadingTimeBeforeIntermediate = (cargoBeforeIntermediate - loadedCargo) / loadingRate;
    const intermediateWaitingTime = ((stepsRemaining - 1) * 10) / 60;
    const timeToIntermediate = loadingTimeBeforeIntermediate + intermediateWaitingTime;

    const now = Date.now();
    const completionSeconds = totalCompletionTime * 3600;
    const intermediateSeconds = timeToIntermediate * 3600;

    const etcTimestamp = now + completionSeconds * 1000;
    const intermediateTimestamp = now + intermediateSeconds * 1000;
    const unberthingTimestamp = intermediateTimestamp + (4 * 3600 * 1000);
    const underwaterInspectionTimestamp = intermediateTimestamp + (6 * 3600 * 1000);

    const currentDatetime = formatDate(now);
    const intermediateDatetime = formatDate(intermediateTimestamp);
    const unberthingDatetime = formatDate(unberthingTimestamp);
    const underwaterInspectionDatetime = formatDate(underwaterInspectionTimestamp);
    const etcDatetime = formatDate(etcTimestamp);

    document.getElementById('inputSummary').innerHTML = '';
    document.getElementById('inputSummary').appendChild(createResultItem('Total Cargo', fmt(totalCargo) + ' MT'));
    document.getElementById('inputSummary').appendChild(createResultItem('Loaded Cargo', fmt(loadedCargo) + ' MT'));
    document.getElementById('inputSummary').appendChild(createResultItem('Trimming Cargo', fmt(trimmingCargo) + ' MT'));
    document.getElementById('inputSummary').appendChild(createResultItem('Cargo before Intermediate', fmt(cargoBeforeIntermediate) + ' MT'));
    document.getElementById('inputSummary').appendChild(createResultItem('Loading Rate', fmt(loadingRate) + ' MT/h'));
    document.getElementById('inputSummary').appendChild(createResultItem('Steps Remaining', String(stepsRemaining)));

    document.getElementById('etcCalculation').innerHTML = '';
    document.getElementById('etcCalculation').appendChild(createResultItem('Loading Time', fmt(loadingTime) + ' hours'));
    document.getElementById('etcCalculation').appendChild(createResultItem('Dead Time', fmt(deadTime) + ' hours'));
    document.getElementById('etcCalculation').appendChild(createResultItem('Total Completion Time', fmt(totalCompletionTime) + ' hours', 'highlight'));

    document.getElementById('intermediateCalc').innerHTML = '';
    document.getElementById('intermediateCalc').appendChild(createResultItem('Loading Time before Intermediate', fmt(loadingTimeBeforeIntermediate) + ' hours'));
    document.getElementById('intermediateCalc').appendChild(createResultItem('Intermediate Waiting Time', fmt(intermediateWaitingTime) + ' hours'));
    document.getElementById('intermediateCalc').appendChild(createResultItem('Total Time to Intermediate', fmt(timeToIntermediate) + ' hours', 'highlight'));

    document.getElementById('estimatedTimes').innerHTML = '';
    document.getElementById('estimatedTimes').appendChild(createResultItem('Current Time', currentDatetime));
    document.getElementById('estimatedTimes').appendChild(createResultItem('Estimated Intermediate Time', intermediateDatetime));
    document.getElementById('estimatedTimes').appendChild(createResultItem('Estimated Unberthing Time', unberthingDatetime));
    document.getElementById('estimatedTimes').appendChild(createResultItem('Underwater Inspection Time', underwaterInspectionDatetime));
    document.getElementById('estimatedTimes').appendChild(createResultItem('ETC - Estimated Completion', etcDatetime, 'highlight'));

    resultsSection.style.display = 'block';
    resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
</script>
</body>
</html>
